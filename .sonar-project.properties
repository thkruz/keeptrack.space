sonar.projectKey=keeptrack
sonar.projectName=keeptrack
sonar.scm.provider=git

# Scope analysis to the product source. Without this the scanner defaults to the repo
# root and spends minutes walking node_modules/dist/.git only to discard them.
sonar.sources=src

sonar.exclusions=src/lib/external/*, public/SOCRATES.html, **/node_modules/**
sonar.javascript.lcov.reportPaths=./coverage/lcov.info
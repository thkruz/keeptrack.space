    <title>Keep Track - 3D Satellite Toolkit</title>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "WebSite",
        "name": "Keep Track - 3D Satellite Toolkit",
        "author": {
          "@type": "Organization",
          "url": "https://keeptrack.space",
          "name": "Kruczek Labs LLC"
        },
        "description": "Free, open-source tool for exploring space in 3D. Simulate satellite launches, visualize breakups, and explore a detailed library of 30,000+ objects. A friendly interface lets you zoom through orbits, find potential collisions, and monitor debris. Keep Track turns anyone into an armchair astronaut!",

        "url": "https://app.keeptrack.space/"
      }
    </script>

    <script src=" settings/settingsOverride.js"></script>

    <!-- Early SW update check: reload before the app bundle loads if a new version is waiting -->
    <script>
      if ('serviceWorker' in navigator && location.protocol === 'https:') {
        (function () {
          var hadController = !!navigator.serviceWorker.controller;

          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (hadController) {
              location.reload();
            }
          });

          navigator.serviceWorker.getRegistration().then(function (reg) {
            if (reg && reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        })();
      }
    </script>
  </head>

  <body>
    <div id="keeptrack-root" class="no-text-select" style="position: absolute; top: 0px; left: 0px; width: 100%; height: 100%; margin: 0;"></div>
  </body>
